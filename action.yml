name: 'Busbar GitHub Workflow Parser'
description: 'Parses a GitHub Actions workflow into a Component Integrity Matrix and transmits it to Salesforce using OIDC zero-trust Token Exchange'
author: 'busbar.agency'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  target-instance:
    description: 'Instance URL of the Busbar-equipped target org (e.g. https://acme.my.salesforce.com). The binary OIDC-exchanges against this org in-process. REQUIRED for the default OIDC path.'
    required: false
    default: ''

  workflow:
    description: 'Path to the GitHub Actions workflow YAML file. Optional in scanner mode: if omitted, every workflow under .github/workflows/ is analyzed.'
    required: false
    default: ''

  sha:
    description: 'Git Commit SHA of the executing workflow context.'
    required: false
    default: ${{ github.sha }}

  rest-endpoint:
    description: 'REST API Endpoint to POST the manifest to on Salesforce (used only if target-instance is set). Defaults to the managed-install path (busbar namespace). For a non-namespaced source-deploy/dev org, set this to /services/apexrest/GitHubWorkflowSync.'
    required: false
    default: '/services/apexrest/busbar/GitHubWorkflowSync'

  output-path:
    description: 'Path to write the JSON integrity matrix.'
    required: false
    default: '${{ runner.temp }}/workflow-reports/integrity.json'

  upload-artifact:
    description: 'Upload the JSON report as a workflow artifact.'
    required: false
    default: 'true'

  artifact-name:
    description: 'Artifact name when upload-artifact=true.'
    required: false
    default: 'workflow-integrity-report'

  report:
    description: 'Scanner mode: run the security rule pack and emit a findings report instead of the integrity-sync flow.'
    required: false
    default: 'false'

  format:
    description: 'Report output format(s): json, sarif, or both.'
    required: false
    default: 'json'

  sarif-out:
    description: 'Path for the SARIF file.'
    required: false
    default: ''

  report-out:
    description: 'Path for the canonical JSON report.'
    required: false
    default: ''

  fail-on:
    description: 'Fail the action (exit 1) if any finding is at or above this severity (critical, high, medium, hygiene, none).'
    required: false
    default: 'none'

outputs:
  workflow-hash:
    description: 'The computed SHA-256 hash of the workflow file.'
    value: ${{ steps.parse.outputs.workflow-hash }}
  report-path:
    description: 'Path to the generated JSON report.'
    value: ${{ steps.parse.outputs.report-path }}
  sarif-path:
    description: 'Path to the generated SARIF report (if format is sarif or both).'
    value: ${{ steps.parse.outputs.sarif-path }}

runs:
  using: 'composite'
  steps:
    - name: Install the gh-workflow-parser binary from actions-dist
      uses: busbar-actions/setup@main
      with:
        binary: gh-workflow-parser
        version: ${{ env.BUSBAR_ACTION_VERSION || 'latest' }}
        binary-repo: ${{ env.BUSBAR_ACTION_REPO || 'busbar-actions/actions-dist' }}

    - name: Parse workflow integrity
      id: parse
      shell: bash
      env:
        SF_INSTANCE_URL: ${{ inputs.target-instance || env.SF_INSTANCE_URL }}
        INPUT_TARGET_INSTANCE: ${{ inputs.target-instance }}
        INPUT_WORKFLOW: ${{ inputs.workflow }}
        INPUT_SHA: ${{ inputs.sha }}
        INPUT_REST_ENDPOINT: ${{ inputs.rest-endpoint }}
        INPUT_OUTPUT_PATH: ${{ inputs.output-path }}
        INPUT_REPORT: ${{ inputs.report }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_SARIF_OUT: ${{ inputs.sarif-out }}
        INPUT_REPORT_OUT: ${{ inputs.report-out }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
      run: |
        set -euo pipefail
        if [ -n "${INPUT_TARGET_INSTANCE}" ]; then
          echo "Transmitting workflow '${INPUT_WORKFLOW}' to ${SF_INSTANCE_URL}${INPUT_REST_ENDPOINT}"
        else
          echo "Parsing workflow '${INPUT_WORKFLOW}' and saving report to ${INPUT_OUTPUT_PATH} (Sync to Salesforce skipped)"
        fi
        gh-workflow-parser

    - name: Upload the JSON report as a workflow artifact
      if: always() && inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.parse.outputs.report-path }}
        if-no-files-found: error
